name: pi-stack

# Four binaries (edge is opt-in):
#   edge      :80 / :443  — TLS termination + rate limit + gzip + access log
#                           OPT-IN: `docker compose --profile edge up -d`
#   proxy     :8092       — reverse proxy + label-driven LB (read-only docker socket)
#                           :8094       — internal metrics endpoint
#   dashboard :8093       — auth-gated management UI (read-write docker socket)
#   monitor   :8095       — scrapes proxy+edge metrics, exposes aggregated stats
#                           (no public port; dashboard reads from it)

networks:
  edge:
    name: edge

services:
  edge:
    build: ./edge
    image: edge:latest
    container_name: edge
    restart: unless-stopped
    profiles: [edge]                    # opt-in: docker compose --profile edge up -d
    networks: [edge]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./edge/data:/data               # autocert cert cache (persisted)
    environment:
      EDGE_DOMAINS: ${EDGE_DOMAINS:-}   # e.g. foo.example.com,bar.example.com
    command: >
      -tls-domains ${EDGE_DOMAINS:-}
      -backend http://proxy:8092
      -rate 100 -burst 200 -max-body 10485760

  proxy:
    build: ./proxy
    image: proxy:latest
    container_name: proxy
    restart: unless-stopped
    networks: [edge]
    ports:
      - "8092:8092"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro     # READ-ONLY
      - ./proxy/routes.json:/etc/proxy/routes.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build: ./dashboard
    image: dashboard:latest
    container_name: dashboard
    restart: unless-stopped
    networks: [edge]
    ports:
      - "8093:8093"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock        # read-write (service mgmt)
      - ./proxy/routes.json:/etc/proxy/routes.json:ro    # same file the proxy reads
      - ./dashboard/data:/data                           # auth.json + audit.log (persisted)
      - /proc:/host-proc:ro                              # host CPU + memory stats
      - /mnt/ssd:/host-root:ro                           # host disk stats (SSD)
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID:   ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_DOMAIN:    ${CLOUDFLARE_DOMAIN:-}
      MONITOR_URL:          http://monitor:8095     # for the Stats tab

  monitor:
    build: ./monitor
    image: monitor:latest
    container_name: monitor
    restart: unless-stopped
    networks: [edge]
    # No host port — dashboard reaches it via the edge network.
    command: >
      -targets proxy=http://proxy:8094/metrics,edge=http://edge:8094/metrics,dashboard=http://dashboard:8094/metrics
      -interval 5s
      -window 1h
