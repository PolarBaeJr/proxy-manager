name: pi-stack

# Four binaries (edge is opt-in):
#   edge      :80 / :443  — TLS termination + rate limit + gzip + access log
#                           OPT-IN: `docker compose --profile edge up -d`
#   proxy     :8092       — reverse proxy + label-driven LB (read-only docker socket)
#                           :8094       — internal metrics endpoint
#   dashboard :8093       — auth-gated management UI (read-write docker socket)
#   monitor   :8095       — scrapes proxy+edge metrics, exposes aggregated stats
#                           (no public port; dashboard reads from it)

networks:
  edge:
    name: edge

services:
  edge:
    build:
      context: .
      dockerfile: cmd/edge/Dockerfile
    image: ghcr.io/polarbaejr/proxy-manager-edge:${EDGE_TAG:-latest}
    container_name: edge
    restart: unless-stopped
    profiles: [edge]                    # opt-in: docker compose --profile edge up -d
    networks: [edge]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./cmd/edge/data:/data           # autocert cert cache (persisted)
    environment:
      EDGE_DOMAINS: ${EDGE_DOMAINS:-}   # e.g. foo.example.com,bar.example.com
      EDGE_PEER_SECRET: ${EDGE_PEER_SECRET:-}
    command: >
      -tls-domains ${EDGE_DOMAINS:-}
      -backend http://proxy:8092
      -rate 100 -burst 200 -max-body 10485760
      -peers ${EDGE_PEERS:-}

  proxy:
    build:
      context: .
      dockerfile: cmd/proxy/Dockerfile
    image: ghcr.io/polarbaejr/proxy-manager-proxy:${PROXY_TAG:-latest}
    container_name: proxy
    restart: unless-stopped
    networks: [edge]
    ports:
      # Loopback-only publish: host nginx proxies to 127.0.0.1:8092, but LAN /
      # internet cannot reach the proxy directly (which would bypass edge's
      # rate limiter and let X-Forwarded-For be spoofed).
      - "127.0.0.1:8092:8092"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro     # READ-ONLY
      - ./cmd/proxy/routes.json:/etc/proxy/routes.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: .
      dockerfile: cmd/dashboard/Dockerfile
    image: ghcr.io/polarbaejr/proxy-manager-dashboard:${DASHBOARD_TAG:-latest}
    container_name: dashboard
    restart: unless-stopped
    networks: [edge]
    ports:
      # Loopback-only publish: dashboard is reached through the proxy on the
      # docker network (Host: dashboard.polardev.org). Direct :8093 access
      # would leak the plaintext login page + session cookie to any LAN peer.
      - "127.0.0.1:8093:8093"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock        # read-write (service mgmt)
      - ./cmd/proxy/routes.json:/etc/proxy/routes.json    # rw: dashboard appends onboarded routes here
      - ./cmd/dashboard/data:/data                       # auth.json + audit.log (persisted)
      - /proc:/host-proc:ro                              # host CPU + memory stats
      - /mnt/ssd:/host-root:ro                           # host disk stats (SSD)
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID:   ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_DOMAIN:    ${CLOUDFLARE_DOMAIN:-}
      MONITOR_URL:          http://monitor:8095     # for the Stats tab
      PROXY_URL:            http://proxy:8094       # for the Access tab (proxy /access)

  monitor:
    build:
      context: .
      dockerfile: cmd/monitor/Dockerfile
    image: ghcr.io/polarbaejr/proxy-manager-monitor:${MONITOR_TAG:-latest}
    container_name: monitor
    restart: unless-stopped
    networks: [edge]
    # No host port — dashboard reaches it via the edge network.
    extra_hosts:
      - "host.docker.internal:host-gateway"   # for TLS-probing nginx on the host
    command: >
      -targets proxy=http://proxy:8094/metrics,edge=http://edge:8094/metrics,dashboard=http://dashboard:8094/metrics
      -interval 5s
      -window 1h
      -tls-probe-targets ${TLS_PROBE_TARGETS:-}
      -tls-probe-interval 15m
