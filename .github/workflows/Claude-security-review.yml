name: Claude-Security-Review

on:
    pull_request:
      types: [opened, synchronize, reopened]
jobs:
    security-review:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: write
        id-token: write
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - id: review
          uses: anthropics/claude-code-action@v1
          with:
            claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
            show_full_output: true
            claude_args: '--allowed-tools "Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git rev-parse:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"'
            prompt: |
              You are performing a security review of this pull request diff.
              Your final assistant message is captured by CI, posted verbatim
              as a PR comment, and used to decide whether the merge is blocked.
              Treat that final message as the review body — not chat.

              STEP 1 — Read every changed line:
                gh pr diff ${{ github.event.pull_request.number }}

              STEP 2 — For each HIGH or MEDIUM security finding, output a block:

                ### <SEVERITY>: <one-line title>
                **File:** `path/to/file.go:LINE`
                **What:** one sentence describing the bug.
                **Why it matters:** one sentence on the concrete exploit path.
                **Fix:** the specific change.

              Categories (non-exhaustive):
                - Hardcoded secrets / credentials / tokens / API keys / passwords
                  (including any string literal that looks like a bypass token
                  or magic value used in authentication)
                - Backdoor / bypass logic — any code path that skips auth, 2FA,
                  authorization, or verification when a specific value is present
                - Insecure credential comparison (`==` / `!=` on secrets; use
                  crypto/subtle.ConstantTimeCompare)
                - Command injection, SQL injection, path traversal
                - XSS: user data interpolated into HTML/JS without escaping
                - CSRF: state-changing endpoint with no token / Origin check
                - InsecureSkipVerify or disabled cert validation
                - Deserialization of untrusted data
                - Auth-bypass or missing auth on state-changing endpoints
                - Overly permissive CORS

              STEP 3 — Your FINAL message must start on line 1 with one of:
                REVIEW_STATUS: FAIL   ← if any high/medium issue exists
                REVIEW_STATUS: PASS   ← if the diff is clean

              After the marker, include the finding blocks (if any) and a
              one-line summary. Never stay silent — silence is treated as
              failure by CI.

              Skip: style, DoS, hardening-only suggestions, theoretical races,
              log spoofing.

        - name: Post review + gate merge
          if: always()
          uses: actions/github-script@v7
          with:
            script: |
              const fs = require('fs');
              const path = '/home/runner/work/_temp/claude-execution-output.json';
              const marker = '<!-- claude-security-review -->';
              const prNumber = context.payload.pull_request.number;

              const postOrUpdate = async (body) => {
                const wrapped = marker + '\n\n' + body;
                const { data: comments } = await github.rest.issues.listComments({
                  ...context.repo, issue_number: prNumber, per_page: 100,
                });
                const existing = comments.find(c => c.body && c.body.startsWith(marker));
                if (existing) {
                  await github.rest.issues.updateComment({
                    ...context.repo, comment_id: existing.id, body: wrapped,
                  });
                  core.info(`Updated existing review comment ${existing.id}`);
                } else {
                  await github.rest.issues.createComment({
                    ...context.repo, issue_number: prNumber, body: wrapped,
                  });
                  core.info('Posted new review comment');
                }
              };

              if (!fs.existsSync(path)) {
                await postOrUpdate('**REVIEW_STATUS: FAIL**\n\n_Claude action did not produce an output file — the review never ran._');
                core.setFailed('Claude action produced no output');
                return;
              }

              // Transcript is one JSON object per line (SDK streaming format).
              const raw = fs.readFileSync(path, 'utf8').trim();
              let entries;
              try {
                entries = JSON.parse(raw);
                if (!Array.isArray(entries)) entries = [entries];
              } catch {
                // Fall back to line-delimited JSON.
                entries = raw.split('\n').filter(Boolean).map(l => JSON.parse(l));
              }

              const texts = [];
              for (const e of entries) {
                if (e.type !== 'assistant') continue;
                const content = e.message?.content || [];
                for (const c of content) {
                  if (c.type === 'text' && c.text) texts.push(c.text);
                }
              }
              const review = texts[texts.length - 1] || '';

              if (!review) {
                await postOrUpdate('**REVIEW_STATUS: FAIL**\n\n_Claude produced no text response — treat as failure until re-run._');
                core.setFailed('Claude response was empty');
                return;
              }

              await postOrUpdate(review);

              const firstLine = review.split('\n').find(l => l.trim().startsWith('REVIEW_STATUS:')) || '';
              core.info('Verdict line: ' + firstLine);
              if (firstLine.includes('PASS')) {
                core.info('Review clean — allowing merge.');
              } else if (firstLine.includes('FAIL')) {
                core.setFailed('Review flagged security issues — blocking merge.');
              } else {
                core.setFailed('Missing REVIEW_STATUS marker — blocking merge.');
              }
