name: Claude-Security-Review

on:
    pull_request:
      types: [opened, synchronize, reopened]
jobs:
    security-review:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: write
        id-token: write
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - id: review
          uses: anthropics/claude-code-action@v1
          with:
            claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
            use_sticky_comment: true
            show_full_output: true
            claude_args: '--allowed-tools "Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git rev-parse:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"'
            prompt: |
              You MUST perform a security review of this pull request diff.
              Your final assistant message is posted verbatim as a sticky PR
              comment — treat it as the review body, not chat.

              STEP 1 — Read every line changed by this PR:
                gh pr diff ${{ github.event.pull_request.number }}

              STEP 2 — For each HIGH or MEDIUM security finding, output a block:

                ### <SEVERITY>: <one-line title>
                **File:** `path/to/file.go:LINE`
                **What:** one sentence describing the bug.
                **Why it matters:** one sentence on the concrete exploit path.
                **Fix:** the specific change.

              Categories to look for (non-exhaustive):
                - Hardcoded secrets / credentials / tokens / API keys / passwords
                  (including any string literal that LOOKS like a bypass token
                  or magic value used in authentication)
                - Backdoor / bypass logic — any code path that skips auth, 2FA,
                  authorization, or verification when a specific value is present
                - Insecure credential comparison (`==` / `!=` on secrets; use
                  crypto/subtle.ConstantTimeCompare)
                - Command injection, SQL injection, path traversal
                - XSS: user data interpolated into HTML/JS without escaping
                - CSRF: state-changing endpoint with no token / Origin check
                - InsecureSkipVerify or disabled cert validation on outbound TLS
                - Deserialization of untrusted data
                - Auth-bypass or missing auth on state-changing endpoints
                - Overly permissive CORS

              STEP 3 — Your final message MUST start with one of these markers
              (on the first line) so the CI post-step can gate on them:

                REVIEW_STATUS: FAIL   ← if you found ANY high/medium issue
                REVIEW_STATUS: PASS   ← if the diff is clean

              After the marker, include the finding blocks (if any) followed by
              a one-line summary. Do NOT skip the marker — the CI step below
              parses it to decide whether to block the merge.

              Skip: style, DoS, hardening-only suggestions, theoretical races,
              log spoofing.

        - name: Gate on review verdict
          env:
            PR_NUMBER: ${{ github.event.pull_request.number }}
          run: |
            set -euo pipefail
            # Pull down the sticky comment we just posted and look for the marker.
            body="$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq '[.[] | select(.user.login=="claude[bot]")][-1].body // ""')"
            if [ -z "$body" ]; then
              echo "::error::Claude review did not post a sticky comment. Failing so this PR cannot merge silently."
              exit 1
            fi
            marker="$(printf '%s\n' "$body" | head -n 1)"
            echo "Marker line: $marker"
            case "$marker" in
              *"REVIEW_STATUS: PASS"*) echo "Clean review — allowing merge."; exit 0 ;;
              *"REVIEW_STATUS: FAIL"*) echo "::error::Claude flagged security issues — see the sticky PR comment. Blocking merge."; exit 1 ;;
              *) echo "::error::Claude did not emit a REVIEW_STATUS marker. Treating as failure."; exit 1 ;;
            esac
          shell: bash
