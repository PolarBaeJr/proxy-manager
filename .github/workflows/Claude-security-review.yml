name: Claude-Security-Review

on:
    pull_request:
      types: [opened, synchronize]
jobs:
    security-review:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: write
        id-token: write
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - uses: anthropics/claude-code-action@v1
          with:
            claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
            use_sticky_comment: true
            claude_args: '--allowed-tools "Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git rev-parse:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"'
            prompt: |
              Security-review this pull request. Your final message becomes a
              sticky PR comment — write it as the review itself, not commentary.

              1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see
                 every added / changed line.

              2. For each finding, use this format:
                    ### <SEVERITY>: <one-line title>
                    **File:** `path/to/file.go:LINE`
                    **What:** one sentence describing the bug.
                    **Why it matters:** one sentence on the concrete exploit.
                    **Fix:** the specific change.

              Look for (non-exhaustive):
                - Hardcoded secrets, credentials, tokens, API keys, passwords
                - Backdoor / bypass logic — any code path that skips auth, 2FA,
                  authorization, or verification when a specific value is present
                - Insecure credential comparison (`==` / `!=` on secrets, should
                  be constant-time)
                - Command injection, SQL injection, path traversal
                - XSS: user data interpolated into HTML/JS without escaping
                - CSRF: state-changing endpoint with no token / Origin check
                - InsecureSkipVerify or disabled cert validation
                - Deserialization of untrusted data
                - Auth-bypass or missing auth on state-changing endpoints
                - Overly permissive CORS

              3. If you find NOTHING high or medium, your final message must be
                 exactly: `✅ No high/medium security issues in this diff.`
                 (Never stay silent — the sticky comment is the review.)

              Do not comment on style, DoS, hardening suggestions, or theoretical
              race conditions.
